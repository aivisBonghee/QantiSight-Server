services:
  db:
    image: postgres:14-alpine
    environment:
      POSTGRES_DB: qantisight
      POSTGRES_USER: qantisight
      POSTGRES_PASSWORD: qantisight
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U qantisight"]
      interval: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://qantisight:qantisight@db:5432/qantisight
      AI_MODEL_URL: http://ai-model:8888
      AI_MODEL_UPLOAD_BASE: /data
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - uploads:/app/uploads

  ai-model:
    image: qantisight-ai-model:latest
    ports:
      - "8888:8888"
    volumes:
      - uploads:/data
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  frontend:
    build:
      context: ./frontend
      args:
        BACKEND_URL: http://backend:8000
    ports:
      - "5173:3000"
    environment:
      BACKEND_URL: http://backend:8000
    depends_on:
      - backend

volumes:
  pgdata:
  uploads:
